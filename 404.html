<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata | RoMimatic</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-section {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }
    .error-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }
    .error-desc {
      font-size: 17px;
      color: var(--text-2);
      max-width: 480px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .error-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preload" as="image" href="/assets/img/logo-s.webp">
  <meta name="theme-color" content="#ffffff">
  <script src="/js/components.js" defer></script>
  <script src="/js/main.js" defer></script>
</head>
<body>
  <div id="nav-root"></div>

  <section class="error-section">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Pagina non trovata</h1>
      <p class="error-desc">La pagina che stai cercando non esiste o è stata spostata. Usa il menu per navigare o contattaci direttamente.</p>
      <div class="error-links">
        <a href="/" class="btn btn-accent">Torna alla home</a>
        <a href="/caffe.html" class="btn btn-outline">Il nostro caffè</a>
        <a href="/contatti.html" class="btn btn-outline">Contattaci</a>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>
</body>
</html>
